name: FlexShape Release
on:
  push:
    branches: [ main ]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Get version
      id: version
      run: |
        latest=$(git tag -l "v1.*" | sort -V | tail -n1)
        if [ -z "$latest" ]; then
          echo "tag=v1.1" >> $GITHUB_OUTPUT
        else
          minor=$(echo $latest | sed 's/v1\.//')
          echo "tag=v1.$((minor + 1))" >> $GITHUB_OUTPUT
        fi
        
    - name: Update bl_info version
      run: |
        version_major=$(echo "${{ steps.version.outputs.tag }}" | sed 's/v\([0-9]*\)\.\([0-9]*\)/\1/')
        version_minor=$(echo "${{ steps.version.outputs.tag }}" | sed 's/v\([0-9]*\)\.\([0-9]*\)/\2/')
        
        find . -name "*.py" -exec grep -l "bl_info" {} \; | while read file; do
          sed -i "s/\"version\": ([0-9]*, [0-9]*, [0-9]*)/\"version\": ($version_major, $version_minor, 0)/" "$file"
          sed -i "s/\"description\": \"v[0-9]*\.[0-9]* Release\"/\"description\": \"${{ steps.version.outputs.tag }} Release\"/" "$file"
        done
        
    - name: Prepare release structure
      run: |
        mkdir -p release/FlexShape
        rsync -av --exclude='.git' --exclude='node_modules' --exclude='.github' --exclude='release' ./ release/FlexShape/
        
    - name: Create zip
      run: |
        cd release
        zip -r ../FlexShape-${{ steps.version.outputs.tag }}.zip FlexShape/
        
    - uses: ncipollo/release-action@v1.12.0
      with:
        tag: ${{ steps.version.outputs.tag }}
        name: FlexShape ${{ steps.version.outputs.tag }}
        artifacts: FlexShape-${{ steps.version.outputs.tag }}.zip
